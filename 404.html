<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Runodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0f14;color:#f0f2f5;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:#5dfc8d;margin-bottom:48px;}
    .num{font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,20vw,200px);line-height:1;color:#5dfc8d;text-shadow:0 0 60px rgba(93,252,141,0.3);letter-spacing:8px;}
    .msg{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,40px);letter-spacing:3px;color:#f0f2f5;margin:8px 0 16px;}
    .sub{font-size:15px;color:rgba(255,255,255,0.4);max-width:360px;line-height:1.7;margin-bottom:36px;}
    .btn{padding:14px 36px;border-radius:60px;border:none;background:#5dfc8d;color:#0d0f14;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;text-decoration:none;transition:all .2s;}
    .btn:hover{box-shadow:0 0 24px rgba(93,252,141,0.4);transform:translateY(-2px);}
  </style>
</head>
<body>
  <div class="logo">🏃 RUNODORO</div>
  <div class="num">404</div>
  <div class="msg">WRONG TRACK</div>
  <p class="sub">This page doesn't exist. Looks like you took a wrong turn on the marathon route.</p>
  <a class="btn" href="/Runodoro/">BACK TO THE RUN →</a>
</body>
</html>
